<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba 3D</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>

  <a-scene>

    <!-- Fondo -->
    <a-sky color="#222"></a-sky>

    <!-- Suelo -->
    <a-plane
      position="0 0 -4"
      rotation="-90 0 0"
      width="6"
      height="6"
      color="#555">
    </a-plane>

    <!-- Contenedor del objeto -->
   

      <a-entity id="modelo" position="0 0 -4">

  <!-- Base de la casa -->
  <a-box
    position="0 0.5 0"
    width="1"
    height="1"
    depth="1"
    color="#FFDAB9">
  </a-box>

  <!-- Tejado -->
  <a-cone
    position="0 1.3 0"
    radius-bottom="0.8"
    height="0.6"
    color="#8B0000">
  </a-cone>

  <!-- Puerta -->
  <a-box
    position="0 0.3 0.51"
    width="0.3"
    height="0.5"
    depth="0.05"
    color="#654321">
  </a-box>

  <!-- Ventana izquierda -->
  <a-box
    position="-0.25 0.6 0.51"
    width="0.2"
    height="0.2"
    depth="0.05"
    color="#87CEEB">
  </a-box>

  <!-- Ventana derecha -->
  <a-box
    position="0.25 0.6 0.51"
    width="0.2"
    height="0.2"
    depth="0.05"
    color="#87CEEB">
  </a-box>

</a-entity>
    <!-- Cámara -->
    <a-camera position="0 1.6 0"></a-camera>

  </a-scene>

</body>
</html>
